    <style>
        :root {
            --brand-green: #9aca3c;
            --dark-bg: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            color: var(--brand-green);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: var(--brand-green);
            color: black;
            text-decoration: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--brand-green);
            border: 2px solid var(--brand-green);
        }

        /* نافذة الفروع المصلحة */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            overflow-y: auto;
        }

        .modal-content {
            background: #111;
            margin: 5% auto;
            padding: 25px;
            width: 85%;
            max-width: 500px;
            border-radius: 20px;
            border: 1px solid var(--brand-green);
            text-align: right;
            position: relative;
        }

        .branch-info {
            border-bottom: 1px solid #333;
            padding: 15px 0;
        }

        .branch-info:last-child { border: none; }

        .city { color: var(--brand-green); font-weight: bold; font-size: 1.1rem; }

        .close-btn {
            color: white;
            font-size: 35px;
            cursor: pointer;
            position: absolute;
            left: 20px;
            top: 10px;
        }

        .phone-link {
            color: #fff;
            text-decoration: none;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
